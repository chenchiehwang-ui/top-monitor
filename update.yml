name: update-data

on:
  schedule:
    - cron: "30 22 * * 1-5"   # 週一至五 22:30 UTC = 台北時間週二至六早上 06:30
  workflow_dispatch:           # 允許手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Fetch data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fetch_data.py

      - name: Commit & push
        run: |
          git config user.name "data-bot"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "auto: update data $(date -u +%F)" || echo "no changes"
          git push
